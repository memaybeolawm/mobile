name: clothes_shop
description: A Flutter clothes shop application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  path: ^1.9.1
  carousel_slider: ^5.0.0
  intl: ^0.20.2
  firebase_core: ^3.15.1
  cloud_firestore: ^5.6.11
  http: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/products/
    - assets/files/
